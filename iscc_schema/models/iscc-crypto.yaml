title: iscc-crypto
type: object
description: Cryptography related ISCC Metadata
properties:
  tophash:
    type: string
    readOnly: true
    minLength: 40
    example: bdyqnosmb56tqudeibogyygmf2b25xs7wpg4zux4zcts2v6llqmnj4ja
    description: A [Multihash](https://multiformats.io/multihash/) of the concatenation (binding)
      of metahash and datahash (default blake3).
    x-iscc-context: http://purl.org/iscc/terms/#tophash
    x-iscc-status: draft
    x-iscc-standard: ISO 24138:2024
  metahash:
    type: string
    minLength: 40
    example: f01551220b94d27b9934d3e08a52e52d7da7dabfac484efe37a5380ee9088f7ace2efcde9
    readOnly: true
    description: A [Multiformats](https://multiformats.io) multihash or IPFS CIDv1 of the
      supplied metadata. The hash is created from `name` and `description` fields or `meta`
      if supplied.
    x-iscc-context: http://purl.org/iscc/terms/#metahash
    x-iscc-status: stable
    x-iscc-standard: ISO 24138:2024
  datahash:
    type: string
    minLength: 40
    example: bdyqk6e2jxh27tingubae32rw3teutg6lexe23qisw7gjve6k4qpteyq
    readOnly: true
    description: A [Multihash](https://multiformats.io/multihash/) of the *digital content*
      (default blake3).
    x-iscc-context: http://purl.org/iscc/terms/#datahash
    x-iscc-status: stable
    x-iscc-standard: ISO 24138:2024
  nonce:
    type: string
    description: Cryptographic nonce for replay protection. A 128-bit random value encoded
      as lowercase hexadecimal.
    example: 0013a3c214c05796673503e6e549446d
    minLength: 32
    maxLength: 32
    pattern: ^[0-9a-f]{32}$
    x-iscc-context: http://purl.org/iscc/terms/#nonce
    x-iscc-status: draft
  signature:
    type: object
    description: Cryptographic signature over ISCC metadata, conforming to the [iscc-crypto](https://github.com/iscc/iscc-crypto)
      signing protocol. Uses EdDSA (Ed25519) with JCS canonicalization.
    x-iscc-context: http://purl.org/iscc/terms/#signature
    x-iscc-status: draft
    required:
    - version
    - proof
    properties:
      version:
        type: string
        description: Signature suite version identifier.
        example: ISCC-SIG v1.0
      controller:
        type: string
        description: URI identifying the key controller (e.g., DID or CID).
        format: uri
      keyid:
        type: string
        description: Key identifier within the controller document.
      pubkey:
        type: string
        description: Ed25519 public key in multibase format (z + base58btc(0xED01 + 32-byte
          key)) as specified in [W3C Multikey](https://www.w3.org/TR/cid/#Multikey).
        pattern: ^z[1-9A-HJ-NP-Za-km-z]+$
        minLength: 48
        maxLength: 48
        example: z6MkrJVnaZkeFzdQyMZu1cgjg7k1pZZ6pvBQ7XJPt4swbTQ2
      proof:
        type: string
        description: EdDSA signature in multibase format (z + base58btc(64-byte signature))
          conforming to [eddsa-jcs-2022](https://www.w3.org/TR/vc-di-eddsa/#eddsa-jcs-2022).
        pattern: ^z[1-9A-HJ-NP-Za-km-z]+$
        minLength: 89
        maxLength: 89
        example: z2HnFSSPPBzR36zdDgK8PbEHeXbR56YF24jwMpt3R1eHXQzJDMWS93FCzpvJpwTWd3GAVFuUfjoJdcnTMuVor51aX
