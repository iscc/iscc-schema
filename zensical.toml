[project]
site_name = "iscc-schema"
site_description = "International Standard Content Code - Schema Definitions."
site_author = "Titusz Pan"
site_url = "https://schema.iscc.codes/"
repo_url = "https://github.com/iscc/iscc-schema"
repo_name = "iscc/iscc-schema"
copyright = """Copyright &copy; 2016-2026 The Authors \
| <a href="https://iscc.foundation/privacy">Privacy Policy</a> \
| <a href="https://iscc.foundation/cookies">Cookie Policy</a> \
| <a href="https://iscc.foundation/imprint">Imprint</a> \
| <a href="https://iscc.foundation/disclaimer">Disclaimer</a>"""
extra_css = ["stylesheets/extra.css"]
extra_javascript = [
    "https://iscc.ai/copilot/index.js",
    "javascripts/copilot.js",
    "javascripts/copypage.js",
]

nav = [
    "index.md",
    { "Getting Started" = [
        "guide.md",
        "examples/index.md",
    ]},
    { "Reference" = [
        "schema/index.md",
        "schema/iscc.md",
        "schema/isbn.md",
        "schema/isrc.md",
        "schema/tdm.md",
        "schema/genai.md",
        "terms/index.md",
        "versioning.md",
    ]},
    { "Project" = [
        "contributing.md",
        "reference/for-coding-agents.md",
        "changelog.md",
    ]},
]

[project.theme]
language = "en"
custom_dir = "docs/overrides"
logo = "assets/logo_light.png"
favicon = "assets/favicon.png"
features = [
    "content.code.annotate",
    "content.code.copy",
    "content.tooltips",
    "header.autohide",
    "navigation.expand",
    "navigation.footer",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle = { icon = "lucide/sun", name = "Switch to dark mode" }

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle = { icon = "lucide/moon", name = "Switch to light mode" }

[project.markdown_extensions]
abbr = {}
admonition = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}
tables = {}

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx]
caret = {}
critic = {}
details = {}
inlinehilite = {}
keys = {}
magiclink = {}
mark = {}
tilde = {}

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [{ name = "mermaid", class = "mermaid" }]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["docs/includes"]
auto_append = ["abbreviations.md"]
